<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mental Wellness Login</title>
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <h3 class="subtitle">Welcome to Mental Health Platform</h3>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <form id="loginForm">
      <input type="email" id="emailInput" placeholder="Enter your email" required>
      <input type="password" id="passwordInput" placeholder="Enter your password" required>
      <button type="submit">Log In 🔐</button>
    </form>
    <p class="forgot"><a href="#">Forgot password? 🔑</a></p>
    <p>New here? <a href="#">Create an account</a></p>
  </div>

  <script src="login.js"></script>
</body>
</html>
